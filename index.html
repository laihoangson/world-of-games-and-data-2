<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        /* Basic reset to ensure full screen and prevent scrolling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevents scrolling */
            background-color: #050505; 
        }
        
        /* Navbar positioned over the home section */
        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            box-sizing: border-box;
        }

        /* --- NEW HOME SECTION --- */
        #home {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('images/background.jpg') no-repeat center center;
            background-size: cover;
            overflow: hidden;
        }

        /* Overlay opacity reduced to make the background clearer */
        #home::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.1); 
            z-index: 0;
        }

        /* Canvas for Particle Effect */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Main content container */
        .home-content {
            position: relative;
            z-index: 2; 
            text-align: center;
            padding: 20px;
            color: #fff;
            max-width: 900px;
        }

        /* 1. Glitch Effect for Title */
        .neon-title {
            font-size: 5rem;
            font-weight: 800;
            text-transform: uppercase;
            position: relative;
            letter-spacing: 2px;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 20px;
            text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00;
            /* Starts immediately */
            animation: glitch 725ms infinite;
        }

        /* The Continuous Glitch Keyframes */
        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; }
            15% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; }
            16% { text-shadow: -0.05em -0.025em 0 #00fffc, 0.025em 0.035em 0 #fc00ff, -0.05em -0.05em 0 #fffc00; }
            49% { text-shadow: -0.05em -0.025em 0 #00fffc, 0.025em 0.035em 0 #fc00ff, -0.05em -0.05em 0 #fffc00; }
            50% { text-shadow: 0.05em 0.035em 0 #00fffc, 0.03em 0 0 #fc00ff, 0 -0.04em 0 #fffc00; }
            99% { text-shadow: 0.05em 0.035em 0 #00fffc, 0.03em 0 0 #fc00ff, 0 -0.04em 0 #fffc00; }
            100% { text-shadow: -0.05em 0 0 #00fffc, -0.025em -0.04em 0 #fc00ff, -0.04em -0.025em 0 #fffc00; }
        }

        /* 2. Typing Effect for Subtitle */
        .home-subtitle {
            font-size: 1.4rem;
            color: #f2e7e7;
            margin-bottom: 40px;
            font-family: 'Consolas', monospace;
            border-right: 1.6px solid transparent; 
            white-space: nowrap;
            overflow: hidden;
            width: 0; 
            margin-left: auto;
            margin-right: auto;
            /* Starts immediately at 0s */
            animation: typing 4s steps(30, end) 0s forwards, 
                       blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #00fffc; }
        }

        /* 3. Button Styles & Entrance Animation for the Button Container */
        .cta-container {
            display: flex;
            justify-content: center;
            gap: 20px; 
            margin-top: 40px;
            opacity: 0;
            transform: translateY(20px);
            /* Delay set to 2s so buttons appear 2 seconds after typing starts */
            animation: buttonEntrance 1s ease-out 1s forwards; 
        }

        @keyframes buttonEntrance {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cyberpunk Button Effect */
        .cta-button {
            position: relative;
            display: inline-block;
            padding: 15px 30px;
            color: #00fffc;
            text-transform: uppercase;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 2px;
            border: 2px solid #00fffc;
            overflow: hidden;
            transition: 0.5s;
            background: transparent;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 255, 252, 0.1);
        }

        .cta-button:hover {
            color: #050801;
            background: #00fffc;
            box-shadow: 0 0 10px #00fffc, 0 0 40px #00fffc, 0 0 80px #00fffc;
            border-color: #00fffc;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .neon-title { font-size: 2.5rem; animation: glitch 725ms infinite; }
            .home-subtitle { font-size: 0.9rem; white-space: normal; border-right: none; width: auto; animation: none; opacity: 0; animation: simpleFade 2s 0s forwards; }
            /* Also updated delay here to 2s for mobile */
            .cta-container { flex-direction: column; gap: 10px; animation-delay: 2s; } 
        }

        @keyframes simpleFade {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

            <a href="index.html" class="logo">World of Games and Data</a>

    <section id="home">
        <canvas id="particles-canvas"></canvas>

        <div class="home-content">
            <h1 class="neon-title" data-text="World of Games and Data">World of Games and Data</h1>
            
            <p class="home-subtitle">Developed by Hoang Son Lai - Business Analytics Student</p>
            
            <div class="cta-container">
                <a href="games.html" class="cta-button">Play Games</a>

            </div>

    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;

        // Particle class definition
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            // Method to draw individual particles
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#00fffc'; 
                ctx.fill();
            }
            // Method to update particle position
            update() {
                // Check collision with screen edges to bounce back
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        // Initialize particle array
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 5) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 5) - 2.5;
                let directionY = (Math.random() * 5) - 2.5;
                let color = '#00fffc';

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // Connect particles with lines if they are close enough
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                    + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance/20000);
                        ctx.strokeStyle = 'rgba(0, 255, 252,' + opacityValue + ')'; 
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Main animation loop
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // Resize event listener to maintain full screen canvas
        window.addEventListener('resize', 
            function(){
                canvas.width = innerWidth;
                canvas.height = innerHeight;
                init();
            }
        );

        init();
        animate();
    </script>
    
    <script src="js/script.js"></script>
